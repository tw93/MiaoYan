name: Release

on:
  workflow_dispatch:
    inputs:
      disabled:
        description: "Release workflow is disabled. Use local /release skill instead."
        required: false
        type: boolean
        default: true

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "This workflow is disabled. Please use local /release skill."
          echo "See .claude/skills/release.md for instructions."
          exit 0
