name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    name: macOS build
    runs-on: macos-15
    timeout-minutes: 25
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve SPM dependencies
        run: |
          xcodebuild \
            -project MiaoYan.xcodeproj \
            -scheme MiaoYan \
            -resolvePackageDependencies

      - name: Build macOS app (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project MiaoYan.xcodeproj \
            -scheme MiaoYan \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions || \
          xcodebuild \
            -project MiaoYan.xcodeproj \
            -scheme MiaoYan \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MiaoYan.xcodeproj \
            -scheme MiaoYan \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO | xcbeautify --renderer github-actions || \
          xcodebuild test \
            -project MiaoYan.xcodeproj \
            -scheme MiaoYan \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  build-ios:
    name: iOS build
    # MiaoYanMobile uses iOS 26 SwiftUI APIs (glassEffect / Liquid Glass).
    # Those symbols only ship in Xcode 26 SDKs, so this job requires the
    # macos-26 runner image. If macos-26 is unavailable the job will fail
    # with a clear runner-not-found error; switch to advisory or skip
    # rather than downgrading the iOS code.
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS app (Debug)
        run: |
          xcodebuild \
            -project MiaoYan.xcodeproj \
            -scheme MiaoYanMobile \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  lint:
    name: Lint
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: Install swift-format
        run: brew install swift-format

      # Project `.swift-format` disables the rules the codebase deliberately
      # violates (PascalCase enum cases, retroactive NSTextStorageDelegate,
      # block comments, forEach). Remaining warnings are real and gate CI.
      - name: Run swift-format
        run: swift-format lint --recursive . --strict

  release-notes-smoke:
    name: Release notes smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Render appcast description HTML
        run: bash scripts/release-ci/notes_to_html.sh .github/RELEASE_NOTES.md > /tmp/description.html

      - name: Render GitHub release body
        run: bash scripts/release-ci/render_release_body.sh .github/RELEASE_NOTES.md > /tmp/release-body.html

      - name: Sanity check rendered outputs
        run: |
          test -s /tmp/description.html
          test -s /tmp/release-body.html

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: startsWith(github.ref, 'refs/tags/V')
    steps:
      - uses: actions/checkout@v4

      - name: Verify MARKETING_VERSION == CURRENT_PROJECT_VERSION == tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          STRIPPED="${TAG#V}"
          # Every target/config must match the tag, not just the first
          # occurrence: the V3.5.1 / #524 drift was a single target out of
          # sync. Collect the distinct values and assert each equals the tag.
          MARKETING=$(grep 'MARKETING_VERSION = ' MiaoYan.xcodeproj/project.pbxproj | sed -E 's/.*MARKETING_VERSION = ([^;]+);.*/\1/' | tr -d ' ' | sort -u)
          PROJECT=$(grep 'CURRENT_PROJECT_VERSION = ' MiaoYan.xcodeproj/project.pbxproj | sed -E 's/.*CURRENT_PROJECT_VERSION = ([^;]+);.*/\1/' | tr -d ' ' | sort -u)
          echo "tag=${STRIPPED}"
          printf 'MARKETING_VERSION values:\n%s\n' "${MARKETING}"
          printf 'CURRENT_PROJECT_VERSION values:\n%s\n' "${PROJECT}"
          fail=0
          while IFS= read -r v; do
            [ -n "${v}" ] || continue
            if [ "${v}" != "${STRIPPED}" ]; then
              echo "::error::MARKETING_VERSION ${v} != tag ${STRIPPED}. See AGENTS.md V3.5.1 / #524."
              fail=1
            fi
          done <<< "${MARKETING}"
          while IFS= read -r v; do
            [ -n "${v}" ] || continue
            if [ "${v}" != "${STRIPPED}" ]; then
              echo "::error::CURRENT_PROJECT_VERSION ${v} != tag ${STRIPPED}. See AGENTS.md V3.5.1 / #524."
              fail=1
            fi
          done <<< "${PROJECT}"
          [ "${fail}" -eq 0 ]
